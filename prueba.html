<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agregar Paciente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-4">
        <div class="card shadow" style="max-width: 800px; margin: 0 auto;">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0">Agregar Paciente</h5>
            </div>
            <div class="card-body">
                <form id="formPaciente">
                    <!-- TIPO - DOCUMENTO -->
                    <div class="row">
                        <div class="col-md-6">
                            <label for="tipoDocumento" class="form-label">Tipo de Documento</label>
                            <select class="form-select" id="tipoDocumento" required>
                                <option value="" disabled selected>Selecciona una especialidad</option>
                                <option value="DNI">Documento Nacional de Identidad</option>
                                <option value="CDE">Carnet de Extranjeria</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="numDocumento" class="form-label">DNI del Paciente</label>
                            <input type="number" class="form-control" id="numDocumento" required>
                        </div>
                    </div><br>
                    <!-- APELLIDOS - NOMBRES -->
                    <div class="row">
                        <div class="col-md-6">
                            <div class="row">
                                <div class="col-md-6">
                                    <label for="apellidoPaterno" class="form-label">Apellido Paterno</label>
                                    <input type="text" class="form-control" id="apellidoPaterno" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="apellidoMaterno" class="form-label">Apellido Materno</label>
                                    <input type="text" class="form-control" id="apellidoMaterno" required>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="nombres" class="form-label">Nombres</label>
                            <input type="text" class="form-control" id="nombres" required>
                        </div>
                    </div><br>
                    <!-- FECHA - EDAD - SEXO - PRIORIDAD -->
                    <div class="row">
                        <div class="col-md-6">
                            <div class="row">
                                <div class="col-md-8">
                                    <label for="fechaNacimiento" class="form-label">Fecha de Nacimiento</label>
                                    <input type="date" class="form-control" id="fechaNacimiento" required">
                                </div>
                                <div class="col-md-4">
                                    <label for="edad" class="form-label">Edad</label>
                                    <input type="number" class="form-control" id="edad" required>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6    ">
                            <div class="row">
                                <div class="col-md-6">
                                    <label for="sexo" class="form-label">Sexo</label>
                                    <select class="form-select" id="sexo" required>
                                        <option value="" disabled selected>Selecciona</option>
                                        <option value="Masculino">Masculino</option>
                                        <option value="Femenino">Femenino</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="prioridad" class="form-label">Prioridad</label>
                                    <select class="form-select" id="prioridad" required>
                                        <option value="" disabled selected>Selecciona</option>
                                        <option value="Normal">Normal</option>
                                        <option value="Alta">Alta</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div><br>
                    <!-- HIST. CLINICA - FECHA MUESTRA -->
                    <div class="row">
                        <div class="col-md-6">
                            <label for="historiaClinica" class="form-label">Historia Clínica</label>
                            <input type="text" class="form-control" id="historiaClinica" required>
                        </div>
                        <div class="col-md-6">
                            <label for="fechaMuestra" class="form-label">Fecha Toma de Muestra</label>
                            <input type="datetime-local" class="form-control" id="fechaMuestra" required>
                        </div>
                    </div><br>
                    <!-- TELEF- CORREO -->
                    <div class="row">
                        <div class="col-md-6">
                            <label for="telefono" class="form-label">Número de Teléfono</label>
                            <input type="num" class="form-control" id="telefono" required>
                        </div>
                        <div class="col-md-6">
                            <label for="correo" class="form-label">Correo</label>
                            <input type="email" class="form-control" id="correo" required>
                        </div>
                    </div><br>
                    <!-- DIRECCION- COMENT -->
                    <div class="row">
                        <div class="col-md-6">
                            <label for="direccion" class="form-label">Dirección</label>
                            <input type="text" class="form-control" id="direccion">
                        </div>
                        <div class="col-md-6">
                            <label for="comentario" class="form-label">Comentario</label>
                            <textarea class="form-control" id="comentario" rows="2"></textarea>
                        </div>
                    </div><br>
                    <!-- APELLIDOS - NOMBRES -->
                    <div class="row">
                        <div class="col-md-6">
                            <div class="row">
                                <div class="col-md-6">
                                    <label for="codigo" class="form-label">Código</label>
                                    <input type="number" class="form-control" id="codigo" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="cmp" class="form-label">C.M.P.</label>
                                    <input type="text" class="form-control" id="cmp" required>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="medico" class="form-label">Nombre y Apellido del Médico</label>
                            <input type="text" class="form-control" id="medico" required>
                        </div>
                    </div>
                    <!-- Botones -->
                    <div class="row">
                        <div class="text-end mt-4">
                            <button type="submit" class="btn btn-success">Guardar</button>
                            <button type="reset" class="btn btn-secondary">Cerrar</button>
                        </div>
                    </div>
            </div>
            </form>
        </div>
    </div>

    <!--saber su edad al instante-->
    <script>
        document.getElementById('fechaNacimiento').addEventListener('change', function () {
            const fechaNacimiento = new Date(this.value);
            const hoy = new Date();
            let edad = hoy.getFullYear() - fechaNacimiento.getFullYear();
            const mes = hoy.getMonth() - fechaNacimiento.getMonth();

            if (mes < 0 || (mes === 0 && hoy.getDate() < fechaNacimiento.getDate())) {
                edad--;
            }

            // Solo mostrar si la edad es válida
            document.getElementById('edad').value = edad >= 0 ? edad : '';
        });
    </script>

</body>

</html>
